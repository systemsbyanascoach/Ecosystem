<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Systems Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beach: {
                            base: '#FDFCF8',    
                            cream: '#F4EFE6',   
                            sand: '#E3D7C5',    
                            latte: '#BCA890',   
                            taupe: '#8C7A6B',   
                            mocha: '#4A3B32',   
                            espresso: '#2C211B' 
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    animation: {
                        'title-glow': 'titleGlow 4s ease-in-out infinite',
                        'slide-up-fade': 'slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-out': 'fadeOut 1s ease-out forwards'
                    },
                    keyframes: {
                        titleGlow: {
                            '0%, 100%': { opacity: 0.85, transform: 'scale(1)' },
                            '50%': { opacity: 1, transform: 'scale(1.02)' }
                        },
                        slideUpFade: {
                            '0%': { opacity: 0, transform: 'translateY(15px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' }
                        },
                        fadeOut: {
                            '0%': { opacity: 1 },
                            '100%': { opacity: 0, visibility: 'hidden' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #FDFCF8;
            color: #2C211B;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background: rgba(253, 252, 248, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .perspective { perspective: 1200px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #2C211B; cursor: pointer; margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #E3D7C5; border-radius: 2px;
        }

        .graph-bar { transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-10deg); }
            30% { transform: rotate(5deg); }
            40% { transform: rotate(-5deg); }
            50% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }
        .animate-ring { animation: ring 2s ease-in-out infinite; }

        /* Robust Overlay Hiding */
        #startup-overlay {
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            z-index: 9999;
        }
        .hide-overlay {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col justify-between overflow-x-hidden">

    <div id="startup-overlay" class="fixed inset-0 bg-beach-base flex flex-col items-center justify-center">
        <div class="w-16 h-16 rounded-2xl bg-beach-espresso flex items-center justify-center shadow-2xl mb-6 animate-slide-up-fade">
            <span class="text-beach-cream font-serif font-bold text-3xl italic">S</span>
        </div>
        <h1 class="text-3xl font-serif font-bold italic tracking-wide text-beach-espresso animate-title-glow">Systems Ecosystem</h1>
        <p class="text-xs text-beach-taupe tracking-widest uppercase mt-4 animate-slide-up-fade" style="animation-delay: 0.2s;">Initializing Shift...</p>
    </div>

    <div id="notif-banner" class="hidden bg-beach-espresso text-beach-base px-5 py-3 text-xs flex justify-between items-center z-[60] shadow-md sticky top-0">
        <div class="flex items-center space-x-2">

            <span>Enable System Alerts for Tasks</span>
        </div>
        <button onclick="requestNotificationPermission()" class="bg-beach-sand text-beach-mocha px-3 py-1.5 rounded-lg font-bold tracking-widest uppercase hover:bg-beach-latte transition">Allow</button>
    </div>

    <canvas id="ambient-canvas" class="fixed inset-0 pointer-events-none z-0 opacity-70"></canvas>

    <div id="app-shell" class="relative z-10 w-full max-w-md mx-auto flex-1 flex flex-col overflow-y-auto no-scrollbar pb-24">
